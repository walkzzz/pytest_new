name: CI

on:
  push:
    branches: [main, master, dev, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 缓存依赖
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pytest_cache
            ${{ github.workspace }}/.pytest_cache
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ matrix.python-version }}-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # 安装类型存根用于mypy检查
          pip install types-PyYAML

      - name: 代码格式检查 (black/isort)
        run: |
          black --check .
          isort --check .
          
      - name: 代码质量检查 (flake8)
        run: flake8 .
          
      - name: 类型检查 (mypy)
        continue-on-error: true  # 临时允许类型错误，后续逐步修复
        run: mypy . --no-error-summary

      - name: 运行测试 (并行+覆盖率)
        run: |
          pytest -n auto --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html -m "not skip_ci" -v --tb=short --exitfirst

      - name: 上传覆盖率报告到Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

      - name: 上传HTML报告 (供调试)
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report-${{ matrix.python-version }}
          path: ./reports

      - name: 上传覆盖率HTML报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report-${{ matrix.python-version }}
          path: ./htmlcov

      - name: 生成Allure报告
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean
          
      - name: 上传Allure报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.python-version }}
          path: allure-report
