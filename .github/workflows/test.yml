name: Pytest Auto Test

on:
  push:
    branches: [main, master, dev, develop]  # 推送到主分支/开发分支触发
  pull_request:
    branches: [main, master]       # PR到主分支触发

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false  # 一个Python版本失败不影响其他版本
      matrix:
        python-version: ["3.10", "3.11", "3.12"]  # 多版本兼容测试

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"  # 缓存依赖，加速

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov  # 安装覆盖率工具

      - name: 运行pytest（跳过标记为skip_ci的用例）
        run: |
          pytest --cov=src --cov-report=xml --cov-report=html -m "not skip_ci" -v --tb=short

      - name: 上传覆盖率报告到Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true  # 覆盖率不达标则CI失败

      - name: 上传HTML报告（供调试）
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report-${{ matrix.python-version }}
          path: ./reports

      - name: 上传覆盖率HTML报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report-${{ matrix.python-version }}
          path: ./htmlcov

      - name: 生成Allure报告
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean
          
      - name: 上传Allure报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.python-version }}
          path: allure-report
