[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .pytest_cache
log_cli = true
log_cli_level = INFO
asyncio_mode = auto
# 注意：需要 pytest-asyncio 插件支持，如使用异步测试请取消注释

addopts = 
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
    --clean-alluredir
    --log-cli-level=INFO
    --html=reports/report.html
    --self-contained-html

markers =
    smoke: 冒烟测试（核心流程）
    regression: 回归测试
    slow: 慢速测试
    api: API测试用例
    ui: UI测试用例
    unit: 单元测试用例
    integration: 集成测试
    skip_ci: 跳过CI执行
    benchmark: 性能基准测试
    debug: 调试专用测试
