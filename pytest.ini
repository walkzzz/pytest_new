[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .pytest_cache
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
asyncio_mode = auto

addopts = 
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
    --clean-alluredir
    --log-cli-level=INFO
    --html=reports/report.html
    --self-contained-html
    --testmon
    --reruns 3
    --reruns-delay 1

markers =
    smoke: 冒烟测试（核心流程）
    regression: 回归测试
    slow: 慢速测试
    api: API测试用例
    ui: UI测试用例
    unit: 单元测试用例
    integration: 集成测试
    skip_ci: 跳过CI执行
    benchmark: 性能基准测试
    debug: 调试专用测试
    rerun: 失败重试测试
